# Server block para exponer la UI de n8n (y los webhooks públicos de la Fase 2).
# Copiar a /etc/nginx/sites-available/n8n.conf, enlazar en sites-enabled,
# `nginx -t && systemctl reload nginx`, y luego `certbot --nginx -d n8n.ganeshastores.com`
# (certbot agrega solo el bloque 443/SSL).
server {
    listen 80;
    server_name n8n.ganeshastores.com;

    location / {
        proxy_pass http://127.0.0.1:5678;
        proxy_http_version 1.1;
        # n8n usa websockets en el editor
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        client_max_body_size 16m;
    }
}
